<!DOCTYPE html>
<html lang="fr" data-theme="neon">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2+2.com — Le filtre ultime</title>
  <meta name="description" content="Un simple test pour savoir si vous méritez le meilleur du web.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cinzel:wght@600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:ital,wght@0,400;0,600;0,700&family=DM+Serif+Display&family=Fraunces:ital,opsz,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@400;600;700&family=JetBrains+Mono:wght@500;700&family=Josefin+Sans:wght@400;600;700&family=Lato:wght@400;700&family=Libre+Baskerville:wght@400;700&family=Newsreader:ital,opsz,wght@0,400;0,700&family=Nunito+Sans:wght@400;600;700&family=Oxanium:wght@500;600;700&family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Source+Sans+3:wght@400;600;700&family=Unbounded:wght@600;700;800&family=Work+Sans:wght@400;600&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="themes.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        var(--pattern-bg, none),
        var(--gradient-bg-1, none),
        var(--gradient-bg-2, none),
        var(--bg-primary);
    }

    /* ========== GRID (100 cartes compactes) ========== */
    .grid-section {
      max-width: min(1200px, 100%);
      margin: calc(4.5rem + 0.75rem) auto 3rem;
      padding: 0 1rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 0.45rem;
    }

    @media (min-width: 600px) {
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); }
    }

    @media (min-width: 1100px) {
      .card-grid { grid-template-columns: repeat(10, 1fr); }
    }

    .card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 0.5rem 0.35rem 0.45rem;
      text-align: center;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      overflow: hidden;
      opacity: 0;
      transform: translateY(12px);
      animation: cardIn 0.4s ease forwards;
    }

    .card--has-egg::after {
      content: "";
      position: absolute;
      top: 5px;
      right: 5px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-secondary);
      opacity: 0.75;
      pointer-events: none;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent-glow), transparent 60%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--card-border-hover);
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
    }

    .card:hover::before { opacity: 1; }

    .card-emoji {
      font-size: 1.35rem;
      display: block;
      margin-bottom: 0.3rem;
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
    }

    .card:hover .card-emoji { transform: scale(1.12) rotate(-3deg); }

    .card-label {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text-primary);
      position: relative;
      z-index: 1;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      hyphens: auto;
      word-break: break-word;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== OVERLAY / QUIZ ========== */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--overlay-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--modal-border);
      border-radius: var(--radius);
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 90%;
      text-align: center;
      position: relative;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.6rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text-primary); }

    .modal-emoji {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .quiz-formula {
      margin-bottom: 1.25rem;
      overflow-x: auto;
      padding: 0.35rem 0;
      color: var(--accent);
    }

    .quiz-formula .katex-display {
      margin: 0;
    }

    .quiz-formula .katex {
      font-size: clamp(1.1rem, 4vw, 2rem);
      color: var(--accent);
    }

    .quiz-formula .katex * {
      color: inherit;
    }

    .quiz-input {
      width: 100%;
      max-width: 200px;
      padding: 0.9rem 1.2rem;
      border: 2px solid var(--input-border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1.4rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .quiz-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .quiz-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.5;
    }

    .quiz-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      color: #fff;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .quiz-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .quiz-btn:active { transform: translateY(0); }

    /* ========== RESULT SCREEN ========== */
    .result-container { display: none; }
    .result-container.show { display: block; }
    .quiz-container.hide { display: none; }

    .result-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .result-link:hover {
      transform: translateY(-2px);
    }

    .result-link.smart {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.25);
    }

    .result-link.dumb {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.25);
    }

    .result-link:hover.smart { box-shadow: 0 8px 30px rgba(34, 197, 94, 0.35); }
    .result-link:hover.dumb { box-shadow: 0 8px 30px rgba(239, 68, 68, 0.35); }

    .result-site-name {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    .result-site-name.smart {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-site-name.dumb {
      background: linear-gradient(135deg, #f87171, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-site-name.egg {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-link.egg {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .result-link:hover.egg { box-shadow: 0 8px 30px var(--accent-glow); }

    .retry-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .retry-btn:hover {
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.25);
    }

    /* ========== HEADER + MENU (aligné sur explore.html) ========== */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 900;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      background: color-mix(in srgb, var(--bg-primary) 88%, transparent);
      border-bottom: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .header-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }

    .header-nav-btn:hover {
      color: var(--text-primary);
      border-color: var(--card-border-hover);
    }

    .header-brand {
      text-align: center;
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: var(--text-primary);
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 910;
      background: var(--overlay-bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .drawer-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 920;
      width: min(20rem, 92vw);
      height: 100vh;
      max-height: 100dvh;
      background: var(--bg-card);
      border-left: 1px solid var(--card-border);
      box-shadow: -12px 0 40px rgba(0, 0, 0, 0.2);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
    }

    .drawer.is-open { transform: translateX(0); }

    .drawer-panel { padding: 1.25rem 1.25rem 2rem; }

    .drawer-section-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin: 1.25rem 0 0.65rem;
    }

    .drawer-section-title:first-child { margin-top: 0; }

    .drawer-hint {
      font-size: 0.85rem;
      line-height: 1.55;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .theme-switcher-drawer {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: min(52vh, 26rem);
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .theme-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: var(--input-bg);
      cursor: pointer;
      text-align: left;
      font-family: var(--font-body);
      color: var(--text-primary);
      transition: border-color 0.2s;
    }

    .theme-row:hover { border-color: var(--card-border-hover); }

    .theme-row.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .theme-swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 2px solid var(--card-border);
    }

    .theme-row[data-pick="neon"] .theme-swatch {
      background: linear-gradient(135deg, #0a0a0f 45%, #7c5cfc 45%, #fc5c9c);
    }
    .theme-row[data-pick="minimal"] .theme-swatch {
      background: linear-gradient(135deg, #fafaf9 50%, #18181b 50%);
    }
    .theme-row[data-pick="vintage"] .theme-swatch {
      background: linear-gradient(135deg, #1a1410 50%, #e8a838 50%);
    }
    .theme-row[data-pick="brutalist"] .theme-swatch {
      background: linear-gradient(135deg, #f0f0e8 50%, #ff3300 50%);
    }
    .theme-row[data-pick="encre"] .theme-swatch {
      background:
        linear-gradient(90deg, transparent 48%, rgba(93, 124, 184, 0.35) 48%, rgba(93, 124, 184, 0.35) 52%, transparent 52%),
        linear-gradient(#0c0e14 55%, #ff5c45 55%);
    }
    .theme-row[data-pick="halftone"] .theme-swatch {
      background:
        radial-gradient(circle, #0d0d0d 1px, transparent 1.5px) 0 0 / 5px 5px,
        #fffdf8;
    }
    .theme-row[data-pick="bifleur"] .theme-swatch {
      background: repeating-linear-gradient(-45deg, #080808, #080808 3px, #dfff3a 3px, #dfff3a 4px);
    }
    .theme-row[data-pick="gres"] .theme-swatch {
      background: repeating-linear-gradient(0deg, #e5dbd2, #e5dbd2 2px, #c87654 2px, #c87654 3px);
    }
    .theme-row[data-pick="ligne-claire"] .theme-swatch {
      background: linear-gradient(180deg, #9fd4ef 40%, #fff8ee 40%, #0c2a45);
    }
    .theme-row[data-pick="riso"] .theme-swatch {
      background: linear-gradient(120deg, #0a5f5f 40%, transparent 40%), linear-gradient(-40deg, #e85d04 35%, #f4eee4 35%);
    }
    .theme-row[data-pick="metal"] .theme-swatch {
      background: repeating-linear-gradient(-20deg, #1a1f27, #1a1f27 2px, #7ec8e3 2px, #7ec8e3 3px);
    }
    .theme-row[data-pick="op-art"] .theme-swatch {
      background: repeating-conic-gradient(#000 0deg 10deg, #fff 10deg 20deg);
    }
    .theme-row[data-pick="deco"] .theme-swatch {
      background: conic-gradient(from 0deg, #d4af37, #0c0a08, #d4af37);
    }
    .theme-row[data-pick="chlorophylle"] .theme-swatch {
      background: radial-gradient(circle at 30% 30%, #c8f27a 0%, transparent 45%), #0d1f14;
    }
    .theme-row[data-pick="pixel"] .theme-swatch {
      background: repeating-conic-gradient(#ff6b9d 0% 25%, #1a0d2e 0% 50%) 0 0 / 6px 6px;
    }
    .theme-row[data-pick="voxel"] .theme-swatch {
      background: linear-gradient(180deg, #87ceeb 35%, #5a9638 35%, #3d2914 100%);
    }

    .share-row {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .share-btn {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: var(--input-bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .share-btn:hover { border-color: var(--accent); }

    /* ========== POLITICAL CARD ========== */
    .political-choice {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .political-btn {
      padding: 0.85rem 2.2rem;
      border: 2px solid var(--accent);
      border-radius: 12px;
      background: transparent;
      color: var(--text-primary);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, color 0.2s;
    }

    .political-btn:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-2px);
    }

    .political-btn:active { transform: translateY(0); }

    .faux-verdict {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 4rem;
      color: var(--fail);
      margin: 1rem 0;
      letter-spacing: -0.02em;
    }

    /* ========== UTILS ========== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }

    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 2000;
      animation: confettiFall 1.5s ease forwards;
    }

    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="bg-gradient"></div>

  <header class="site-header">
    <a href="explore.html" class="header-nav-btn" aria-label="Explorer tous les thèmes" title="Explorer">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7.5" cy="7.5" r="5.5"/>
        <line x1="11.5" y1="11.5" x2="16" y2="16"/>
      </svg>
    </a>
    <span class="header-brand">2+2</span>
    <button type="button" class="header-nav-btn" id="menuToggle" aria-expanded="false" aria-controls="drawerPanel" aria-label="Ouvrir le menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
      </svg>
    </button>
  </header>

  <div class="drawer-backdrop" id="drawerBackdrop" aria-hidden="true"></div>
  <aside class="drawer" id="drawer" aria-hidden="true" aria-label="Menu">
    <div class="drawer-panel" id="drawerPanel">
      <p class="drawer-section-title">Évidences</p>
      <p class="drawer-hint">Choisissez une carte. Répondez à la question. Le résultat est un nom et un lien — sans commentaire.</p>
      <p class="drawer-section-title">Direction artistique</p>
      <div class="theme-switcher-drawer" role="group" aria-label="Direction artistique">
        <button type="button" class="theme-row active" data-pick="neon"><span class="theme-swatch" aria-hidden="true"></span> Neon</button>
        <button type="button" class="theme-row" data-pick="minimal"><span class="theme-swatch" aria-hidden="true"></span> Minimal</button>
        <button type="button" class="theme-row" data-pick="vintage"><span class="theme-swatch" aria-hidden="true"></span> Vintage</button>
        <button type="button" class="theme-row" data-pick="brutalist"><span class="theme-swatch" aria-hidden="true"></span> Brutalist</button>
        <button type="button" class="theme-row" data-pick="encre"><span class="theme-swatch" aria-hidden="true"></span> Encre &amp; calque</button>
        <button type="button" class="theme-row" data-pick="halftone"><span class="theme-swatch" aria-hidden="true"></span> Pointillé</button>
        <button type="button" class="theme-row" data-pick="bifleur"><span class="theme-swatch" aria-hidden="true"></span> Bifleur</button>
        <button type="button" class="theme-row" data-pick="gres"><span class="theme-swatch" aria-hidden="true"></span> Grès</button>
        <button type="button" class="theme-row" data-pick="ligne-claire"><span class="theme-swatch" aria-hidden="true"></span> Ligne claire</button>
        <button type="button" class="theme-row" data-pick="riso"><span class="theme-swatch" aria-hidden="true"></span> Risographie</button>
        <button type="button" class="theme-row" data-pick="metal"><span class="theme-swatch" aria-hidden="true"></span> Métal brossé</button>
        <button type="button" class="theme-row" data-pick="op-art"><span class="theme-swatch" aria-hidden="true"></span> Op-art</button>
        <button type="button" class="theme-row" data-pick="deco"><span class="theme-swatch" aria-hidden="true"></span> Art déco</button>
        <button type="button" class="theme-row" data-pick="chlorophylle"><span class="theme-swatch" aria-hidden="true"></span> Chlorophylle</button>
        <button type="button" class="theme-row" data-pick="pixel"><span class="theme-swatch" aria-hidden="true"></span> Pixel art</button>
        <button type="button" class="theme-row" data-pick="voxel"><span class="theme-swatch" aria-hidden="true"></span> Voxel</button>
      </div>
      <p class="drawer-section-title">Partager</p>
      <div class="share-row">
        <button type="button" class="share-btn" id="copyPageUrl">Copier le lien de la page</button>
        <button type="button" class="share-btn" id="nativeShareBtn">Partager…</button>
      </div>
    </div>
  </aside>

  <section class="grid-section">
    <div class="card-grid" id="cardGrid"></div>
  </section>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Fermer">&times;</button>

      <!-- QUIZ (standard) -->
      <div class="quiz-container" id="quizContainer">
        <div class="modal-emoji" id="modalEmoji"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="quiz-formula" id="quizFormula"></div>
        <div id="standardInput">
          <input
            type="text"
            class="quiz-input"
            id="quizInput"
            placeholder="?"
            autocomplete="off"
            inputmode="decimal"
          >
          <br>
          <button class="quiz-btn" id="quizBtn">
            Valider
            <span>→</span>
          </button>
        </div>
        <div id="politicalInput" style="display:none">
          <div class="political-choice">
            <button class="political-btn" id="btnGauche">Gauche</button>
            <button class="political-btn" id="btnDroite">Droite</button>
          </div>
        </div>
      </div>

      <!-- RESULT (standard) -->
      <div class="result-container" id="resultContainer">
        <div class="result-site-name" id="resultSiteName"></div>
        <a class="result-link" id="resultLink" target="_blank" rel="noopener noreferrer">Accéder au site →</a>
        <br>
        <button class="retry-btn" id="retryBtn">←</button>
      </div>

      <!-- RESULT (political) -->
      <div class="result-container" id="politicalResult">
        <div class="faux-verdict">Faux.</div>
        <br>
        <button class="retry-btn" id="retryBtnPolitical">←</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script>
    const RESULT_LINK_LABEL = "Accéder au site →";

    let currentCategory = null;
    let categories = [];

    const grid = document.getElementById("cardGrid");
    const overlay = document.getElementById("overlay");
    const modalClose = document.getElementById("modalClose");
    const quizContainer = document.getElementById("quizContainer");
    const resultContainer = document.getElementById("resultContainer");
    const modalEmoji = document.getElementById("modalEmoji");
    const modalTitle = document.getElementById("modalTitle");
    const quizInput = document.getElementById("quizInput");
    const quizBtn = document.getElementById("quizBtn");
    const resultSiteName = document.getElementById("resultSiteName");
    const resultLink = document.getElementById("resultLink");
    const retryBtn = document.getElementById("retryBtn");
    const menuToggle = document.getElementById("menuToggle");
    const drawer = document.getElementById("drawer");
    const drawerBackdrop = document.getElementById("drawerBackdrop");
    const copyPageUrl = document.getElementById("copyPageUrl");
    const nativeShareBtn = document.getElementById("nativeShareBtn");

    function setDrawerOpen(open) {
      if (!drawer || !drawerBackdrop) return;
      drawer.classList.toggle("is-open", open);
      drawerBackdrop.classList.toggle("is-open", open);
      drawer.setAttribute("aria-hidden", String(!open));
      drawerBackdrop.setAttribute("aria-hidden", String(!open));
      if (menuToggle) menuToggle.setAttribute("aria-expanded", String(open));
    }

    if (menuToggle) {
      menuToggle.addEventListener("click", () => {
        setDrawerOpen(!drawer.classList.contains("is-open"));
      });
    }
    drawerBackdrop.addEventListener("click", () => setDrawerOpen(false));

    if (copyPageUrl) {
      copyPageUrl.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(window.location.href);
          copyPageUrl.textContent = "Lien copié";
          setTimeout(() => { copyPageUrl.textContent = "Copier le lien de la page"; }, 2000);
        } catch {
          copyPageUrl.textContent = "Copie impossible";
          setTimeout(() => { copyPageUrl.textContent = "Copier le lien de la page"; }, 2000);
        }
      });
    }

    if (nativeShareBtn) {
      nativeShareBtn.addEventListener("click", async () => {
        const payload = { title: document.title, text: "2+2.com", url: window.location.href };
        if (navigator.share) {
          try {
            await navigator.share(payload);
          } catch (e) {
            if (e.name !== "AbortError") nativeShareBtn.textContent = "Partage indisponible";
          }
        } else {
          try {
            await navigator.clipboard.writeText(window.location.href);
            nativeShareBtn.textContent = "Lien copié";
            setTimeout(() => { nativeShareBtn.textContent = "Partager…"; }, 2000);
          } catch {
            nativeShareBtn.textContent = "Non supporté";
          }
        }
      });
    }

    function pickRandom(pool) {
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function renderFormula(formula) {
      quizFormula.innerHTML = "";
      if (typeof katex !== "undefined") {
        katex.render(formula + " = \\,?", quizFormula, {
          throwOnError: false,
          displayMode: true
        });
      } else {
        quizFormula.textContent = formula + " = ?";
      }
    }

    function buildGrid(list) {
      grid.innerHTML = "";
      list.forEach((cat, i) => {
        const card = document.createElement("div");
        card.className = "card";
        if (cat.easterEggs && cat.easterEggs.length) card.classList.add("card--has-egg");
        card.setAttribute("role", "button");
        card.setAttribute("tabindex", "0");
        card.setAttribute("aria-label", cat.name);
        card.style.animationDelay = `${Math.min(i * 0.015, 1.2)}s`;
        card.innerHTML = `
          <span class="card-emoji">${cat.emoji}</span>
          <span class="card-label">${cat.name}</span>
        `;
        card.addEventListener("click", () => openQuiz(cat));
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openQuiz(cat);
          }
        });
        grid.appendChild(card);
      });
    }

    async function loadCategories() {
      try {
        const r = await fetch("categories.json");
        if (!r.ok) throw new Error(r.status);
        categories = await r.json();
      } catch {
        categories = [];
      }
      if (categories.length) buildGrid(categories);
    }

    loadCategories();

    const standardInput = document.getElementById("standardInput");
    const politicalInput = document.getElementById("politicalInput");
    const politicalResult = document.getElementById("politicalResult");
    const quizFormula = document.getElementById("quizFormula");
    const btnGauche = document.getElementById("btnGauche");
    const btnDroite = document.getElementById("btnDroite");
    const retryBtnPolitical = document.getElementById("retryBtnPolitical");

    function openQuiz(category) {
      currentCategory = category;
      modalEmoji.textContent = category.emoji;
      modalTitle.textContent = category.name;

      quizContainer.classList.remove("hide");
      resultContainer.classList.remove("show");
      politicalResult.classList.remove("show");
      quizInput.value = "";

      const isPolitical = category.type === "political";
      standardInput.style.display = isPolitical ? "none" : "";
      politicalInput.style.display = isPolitical ? "" : "none";

      if (isPolitical) {
        quizFormula.innerHTML = "";
        const q = document.createElement("div");
        q.style.cssText =
          "font-family:var(--font-heading);font-weight:800;font-size:clamp(1.2rem,4vw,2rem);" +
          "background:linear-gradient(135deg,var(--accent),var(--accent-secondary));" +
          "-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;";
        q.textContent = "Pour qui voter ?";
        quizFormula.appendChild(q);
      } else {
        renderFormula(category.formula);
        quizInput.setAttribute("inputmode", category.inputMode || "decimal");
      }

      overlay.classList.add("active");
      document.body.style.overflow = "hidden";
      setDrawerOpen(false);

      if (!isPolitical) setTimeout(() => quizInput.focus(), 400);
    }

    function showPoliticalResult() {
      quizContainer.classList.add("hide");
      politicalResult.classList.add("show");
    }

    function closeOverlay() {
      overlay.classList.remove("active");
      document.body.style.overflow = "";
      currentCategory = null;
    }

    function checkAnswer(input, category) {
      const trimmed = input.trim().replace(",", ".");
      const numericVal = parseFloat(trimmed);

      for (const egg of category.easterEggs || []) {
        const eggAnswer = typeof egg.answer === "number" ? egg.answer : String(egg.answer);
        if (typeof eggAnswer === "number" && !isNaN(numericVal) && Math.abs(numericVal - eggAnswer) < 0.01) {
          return { type: "egg", result: egg };
        }
        if (String(eggAnswer).toLowerCase() === trimmed.toLowerCase()) {
          return { type: "egg", result: egg };
        }
      }

      if (!isNaN(numericVal) && Math.abs(numericVal - category.correctAnswer) < 0.01) {
        return { type: "smart", result: category.smart };
      }

      if (category.dumb.type === "random") {
        return { type: "dumb", result: pickRandom(category.dumb.pool) };
      }

      return { type: "dumb", result: { name: category.dumb.name, url: category.dumb.url } };
    }

    function showResult(outcome) {
      quizContainer.classList.add("hide");
      resultContainer.classList.add("show");

      const cls = outcome.type;
      resultSiteName.className = `result-site-name ${cls}`;
      resultSiteName.style.cssText = "";
      resultSiteName.textContent = outcome.result.name;
      resultLink.className = `result-link ${cls}`;
      resultLink.style.cssText = "";
      resultLink.href = outcome.result.url;
      resultLink.textContent = RESULT_LINK_LABEL;
    }

    function submitAnswer() {
      if (!currentCategory || currentCategory.type === "political") return;
      const val = quizInput.value;
      if (!val.trim()) {
        quizInput.classList.add("shake");
        setTimeout(() => quizInput.classList.remove("shake"), 400);
        return;
      }
      const outcome = checkAnswer(val, currentCategory);
      showResult(outcome);
    }

    quizBtn.addEventListener("click", submitAnswer);
    quizInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitAnswer();
    });

    modalClose.addEventListener("click", closeOverlay);
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeOverlay();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (overlay.classList.contains("active")) closeOverlay();
      else setDrawerOpen(false);
    });

    retryBtn.addEventListener("click", closeOverlay);
    retryBtnPolitical.addEventListener("click", closeOverlay);
    btnGauche.addEventListener("click", showPoliticalResult);
    btnDroite.addEventListener("click", showPoliticalResult);

    document.querySelectorAll(".theme-row").forEach(btn => {
      btn.addEventListener("click", () => {
        const theme = btn.dataset.pick;
        document.documentElement.setAttribute("data-theme", theme);
        document.querySelectorAll(".theme-row").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        localStorage.setItem("theme", theme);
        setDrawerOpen(false);
      });
    });

    const VALID_THEMES = new Set([
      "neon", "minimal", "vintage", "brutalist", "encre", "halftone", "bifleur", "gres",
      "ligne-claire", "riso", "metal", "op-art", "deco", "chlorophylle", "pixel", "voxel"
    ]);
    let savedTheme = localStorage.getItem("theme");
    if (savedTheme && !VALID_THEMES.has(savedTheme)) {
      savedTheme = "neon";
      localStorage.setItem("theme", savedTheme);
    }
    if (savedTheme) {
      document.documentElement.setAttribute("data-theme", savedTheme);
      document.querySelectorAll(".theme-row").forEach(b => {
        b.classList.toggle("active", b.dataset.pick === savedTheme);
      });
    }

    function spawnConfetti() {
      const colors = ["#7c5cfc", "#fc5c9c", "#4ade80", "#facc15", "#38bdf8", "#fb923c"];
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.top = `${-10 + Math.random() * 20}px`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 0.6}s`;
        piece.style.animationDuration = `${1 + Math.random() * 1.5}s`;
        piece.style.width = `${6 + Math.random() * 6}px`;
        piece.style.height = `${6 + Math.random() * 6}px`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3000);
      }
    }
  </script>
</body>
</html>
