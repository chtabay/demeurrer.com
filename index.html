<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2+2.com — Le filtre ultime</title>
  <meta name="description" content="Un simple test pour savoir si vous méritez le meilleur du web.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&family=DM+Serif+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root,
    [data-theme="neon"] {
      --bg-primary: #0a0a0f;
      --bg-card: #15151f;
      --bg-card-hover: #1e1e2e;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.35);
      --accent-secondary: #fc5c9c;
      --text-primary: #f0eff4;
      --text-secondary: #9896a6;
      --success: #4ade80;
      --fail: #f87171;
      --radius: 16px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font-heading: 'Syne', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
      --card-border: rgba(255, 255, 255, 0.06);
      --card-border-hover: rgba(124, 92, 252, 0.3);
      --card-shadow-hover: 0 12px 40px rgba(124, 92, 252, 0.15);
      --overlay-bg: rgba(10, 10, 15, 0.85);
      --modal-border: rgba(255, 255, 255, 0.08);
      --gradient-bg-1: radial-gradient(ellipse 60% 50% at 20% 10%, rgba(124, 92, 252, 0.12) 0%, transparent 60%);
      --gradient-bg-2: radial-gradient(ellipse 50% 40% at 80% 80%, rgba(252, 92, 156, 0.08) 0%, transparent 60%);
    }

    [data-theme="minimal"] {
      --bg-primary: #fafaf9;
      --bg-card: #ffffff;
      --bg-card-hover: #f5f5f4;
      --accent: #18181b;
      --accent-glow: rgba(24, 24, 27, 0.08);
      --accent-secondary: #a1a1aa;
      --text-primary: #18181b;
      --text-secondary: #71717a;
      --success: #16a34a;
      --fail: #dc2626;
      --radius: 12px;
      --transition: 0.25s ease;
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
      --card-border: rgba(0, 0, 0, 0.08);
      --card-border-hover: rgba(0, 0, 0, 0.18);
      --card-shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.06);
      --overlay-bg: rgba(250, 250, 249, 0.9);
      --modal-border: rgba(0, 0, 0, 0.08);
      --gradient-bg-1: none;
      --gradient-bg-2: none;
    }

    [data-theme="vintage"] {
      --bg-primary: #1a1410;
      --bg-card: #2a2118;
      --bg-card-hover: #382d22;
      --accent: #e8a838;
      --accent-glow: rgba(232, 168, 56, 0.25);
      --accent-secondary: #c45d3e;
      --text-primary: #f5e6d0;
      --text-secondary: #a89880;
      --success: #8fbc5a;
      --fail: #c45d3e;
      --radius: 8px;
      --transition: 0.3s ease;
      --font-heading: 'DM Serif Display', serif;
      --font-body: 'Space Grotesk', sans-serif;
      --card-border: rgba(232, 168, 56, 0.12);
      --card-border-hover: rgba(232, 168, 56, 0.35);
      --card-shadow-hover: 0 10px 35px rgba(232, 168, 56, 0.1);
      --overlay-bg: rgba(26, 20, 16, 0.9);
      --modal-border: rgba(232, 168, 56, 0.15);
      --gradient-bg-1: radial-gradient(ellipse 60% 50% at 30% 20%, rgba(232, 168, 56, 0.07) 0%, transparent 60%);
      --gradient-bg-2: radial-gradient(ellipse 50% 40% at 70% 80%, rgba(196, 93, 62, 0.05) 0%, transparent 60%);
    }

    [data-theme="brutalist"] {
      --bg-primary: #f0f0e8;
      --bg-card: #ffffff;
      --bg-card-hover: #e8e8d8;
      --accent: #ff3300;
      --accent-glow: rgba(255, 51, 0, 0.15);
      --accent-secondary: #0033ff;
      --text-primary: #111111;
      --text-secondary: #555555;
      --success: #00aa44;
      --fail: #ff3300;
      --radius: 0px;
      --transition: 0.1s linear;
      --font-heading: 'Space Mono', monospace;
      --font-body: 'Space Mono', monospace;
      --card-border: 2px solid #111111;
      --card-border-hover: 2px solid #ff3300;
      --card-shadow-hover: 4px 4px 0 #111111;
      --overlay-bg: rgba(240, 240, 232, 0.95);
      --modal-border: 2px solid #111111;
      --gradient-bg-1: none;
      --gradient-bg-2: none;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        var(--gradient-bg-1, none),
        var(--gradient-bg-2, none),
        var(--bg-primary);
    }

    /* ========== GRID ========== */
    .grid-section {
      max-width: 1100px;
      margin: 3.5rem auto 4rem;
      padding: 0 1.5rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    @media (max-width: 900px) {
      .card-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1.8rem 1rem 1.4rem;
      text-align: center;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      overflow: hidden;
      opacity: 0;
      transform: translateY(24px);
      animation: cardIn 0.5s ease forwards;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent-glow), transparent 60%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--card-border-hover);
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
    }

    .card:hover::before { opacity: 1; }

    .card-emoji {
      font-size: 2.6rem;
      display: block;
      margin-bottom: 0.75rem;
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
    }

    .card:hover .card-emoji { transform: scale(1.15) rotate(-4deg); }

    .card-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      position: relative;
      z-index: 1;
      line-height: 1.4;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== OVERLAY / QUIZ ========== */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--overlay-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--modal-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 90%;
      text-align: center;
      position: relative;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.6rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text-primary); }

    .modal-emoji {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .modal-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .quiz-question {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 2.8rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-input {
      width: 100%;
      max-width: 200px;
      padding: 0.9rem 1.2rem;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1.4rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .quiz-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .quiz-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.5;
    }

    .quiz-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #6246ea);
      color: #fff;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .quiz-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .quiz-btn:active { transform: translateY(0); }

    /* ========== RESULT SCREEN ========== */
    .result-container { display: none; }
    .result-container.show { display: block; }
    .quiz-container.hide { display: none; }

    .result-icon { font-size: 4rem; margin-bottom: 1rem; }

    .result-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .result-title.smart { color: var(--success); }
    .result-title.dumb { color: var(--fail); }

    .result-message {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 1.8rem;
      line-height: 1.6;
    }

    .result-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .result-link:hover {
      transform: translateY(-2px);
    }

    .result-link.smart {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.25);
    }

    .result-link.dumb {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.25);
    }

    .result-link:hover.smart { box-shadow: 0 8px 30px rgba(34, 197, 94, 0.35); }
    .result-link:hover.dumb { box-shadow: 0 8px 30px rgba(239, 68, 68, 0.35); }

    .result-site-name {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    .result-site-name.smart {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-site-name.dumb {
      background: linear-gradient(135deg, #f87171, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .retry-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .retry-btn:hover {
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.25);
    }

    /* ========== FOOTER ========== */
    footer {
      text-align: center;
      padding: 2rem 1rem 3rem;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* ========== THEME SWITCHER ========== */
    .theme-switcher {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 900;
      display: flex;
      gap: 0.35rem;
      padding: 0.35rem;
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .theme-btn {
      width: 28px;
      height: 28px;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      position: relative;
    }

    .theme-btn:hover { transform: scale(1.15); }

    .theme-btn.active {
      border-color: var(--accent);
      transform: scale(1.1);
    }

    .theme-btn[data-pick="neon"] {
      background: linear-gradient(135deg, #0a0a0f 50%, #7c5cfc 50%);
    }

    .theme-btn[data-pick="minimal"] {
      background: linear-gradient(135deg, #fafaf9 50%, #18181b 50%);
    }

    .theme-btn[data-pick="vintage"] {
      background: linear-gradient(135deg, #1a1410 50%, #e8a838 50%);
    }

    .theme-btn[data-pick="brutalist"] {
      background: linear-gradient(135deg, #f0f0e8 50%, #ff3300 50%);
    }

    .theme-label {
      display: none;
      position: absolute;
      bottom: -1.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      white-space: nowrap;
      color: var(--text-secondary);
      font-family: var(--font-body);
    }

    .theme-btn:hover .theme-label { display: block; }

    /* ========== POLITICAL CARD ========== */
    .political-choice {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .political-btn {
      padding: 0.85rem 2.2rem;
      border: 2px solid var(--accent);
      border-radius: 12px;
      background: transparent;
      color: var(--text-primary);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, color 0.2s;
    }

    .political-btn:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-2px);
    }

    .political-btn:active { transform: translateY(0); }

    .faux-verdict {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 4rem;
      color: var(--fail);
      margin: 1rem 0;
      letter-spacing: -0.02em;
    }

    /* ========== UTILS ========== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }

    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 2000;
      animation: confettiFall 1.5s ease forwards;
    }

    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="bg-gradient"></div>

  <nav class="theme-switcher" aria-label="Direction artistique">
    <button class="theme-btn active" data-pick="neon" aria-label="Thème Neon">
      <span class="theme-label">Neon</span>
    </button>
    <button class="theme-btn" data-pick="minimal" aria-label="Thème Minimal">
      <span class="theme-label">Minimal</span>
    </button>
    <button class="theme-btn" data-pick="vintage" aria-label="Thème Vintage">
      <span class="theme-label">Vintage</span>
    </button>
    <button class="theme-btn" data-pick="brutalist" aria-label="Thème Brutalist">
      <span class="theme-label">Brutalist</span>
    </button>
  </nav>

  <section class="grid-section">
    <div class="card-grid" id="cardGrid"></div>
  </section>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Fermer">&times;</button>

      <!-- QUIZ (standard) -->
      <div class="quiz-container" id="quizContainer">
        <div class="modal-emoji" id="modalEmoji"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-subtitle" id="modalSubtitle">Prouvez que vous méritez le meilleur.</div>
        <div class="quiz-question" id="quizQuestion">2 + 2 = ?</div>
        <div id="standardInput">
          <input
            type="number"
            class="quiz-input"
            id="quizInput"
            placeholder="?"
            autocomplete="off"
            inputmode="numeric"
          >
          <br>
          <button class="quiz-btn" id="quizBtn">
            Valider
            <span>→</span>
          </button>
        </div>
        <div id="politicalInput" style="display:none">
          <div class="political-choice">
            <button class="political-btn" id="btnGauche">Gauche</button>
            <button class="political-btn" id="btnDroite">Droite</button>
          </div>
        </div>
      </div>

      <!-- RESULT (standard) -->
      <div class="result-container" id="resultContainer">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-site-name" id="resultSiteName"></div>
        <div class="result-message" id="resultMessage"></div>
        <a class="result-link" id="resultLink" target="_blank" rel="noopener noreferrer">
          Accéder au site →
        </a>
        <br>
        <button class="retry-btn" id="retryBtn">← Choisir un autre thème</button>
      </div>

      <!-- RESULT (political) -->
      <div class="result-container" id="politicalResult">
        <div class="faux-verdict">Faux.</div>
        <br>
        <button class="retry-btn" id="retryBtnPolitical">←</button>
      </div>
    </div>
  </div>

  <footer>
    <p>Fait avec discernement — <a href="https://www.seventee.com" target="_blank">Seventee.com</a></p>
  </footer>

  <script>

    const SMART_MESSAGES = [
      "Bravo, vous faites partie de l'élite intellectuelle.",
      "Félicitations, votre QI est au-dessus de la moyenne.",
      "Bien joué. Vous méritez ce qu'il y a de mieux.",
      "Évidemment que c'est 4. Voici votre récompense.",
      "Un esprit brillant mérite un outil brillant."
    ];

    const DUMB_MESSAGES = [
      "Hmm… Peut-être que celui-ci est plus adapté à votre niveau.",
      "Pas grave. On a tous des jours sans. Voici votre alternative.",
      "C'était 4. Mais ne vous inquiétez pas, on a pensé à vous.",
      "Bon… On va vous orienter vers quelque chose de plus… accessible.",
      "La réponse était 4. Voici votre alternative."
    ];

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    let currentCategory = null;

    const grid = document.getElementById("cardGrid");
    const overlay = document.getElementById("overlay");
    const modalClose = document.getElementById("modalClose");
    const quizContainer = document.getElementById("quizContainer");
    const resultContainer = document.getElementById("resultContainer");
    const modalEmoji = document.getElementById("modalEmoji");
    const modalTitle = document.getElementById("modalTitle");
    const quizInput = document.getElementById("quizInput");
    const quizBtn = document.getElementById("quizBtn");
    const resultIcon = document.getElementById("resultIcon");
    const resultTitle = document.getElementById("resultTitle");
    const resultSiteName = document.getElementById("resultSiteName");
    const resultMessage = document.getElementById("resultMessage");
    const resultLink = document.getElementById("resultLink");
    const retryBtn = document.getElementById("retryBtn");

    CATEGORIES.forEach((cat, i) => {
      const card = document.createElement("div");
      card.className = "card";
      card.setAttribute("role", "button");
      card.setAttribute("tabindex", "0");
      card.setAttribute("aria-label", cat.name);
      card.style.animationDelay = `${i * 0.05}s`;
      card.innerHTML = `
        <span class="card-emoji">${cat.emoji}</span>
        <span class="card-label">${cat.name}</span>
      `;
      card.addEventListener("click", () => openQuiz(cat));
      grid.appendChild(card);
    });

    const standardInput = document.getElementById("standardInput");
    const politicalInput = document.getElementById("politicalInput");
    const politicalResult = document.getElementById("politicalResult");
    const quizQuestion = document.getElementById("quizQuestion");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const btnGauche = document.getElementById("btnGauche");
    const btnDroite = document.getElementById("btnDroite");
    const retryBtnPolitical = document.getElementById("retryBtnPolitical");

    function openQuiz(category) {
      currentCategory = category;
      modalEmoji.textContent = category.emoji;
      modalTitle.textContent = category.name;

      quizContainer.classList.remove("hide");
      resultContainer.classList.remove("show");
      politicalResult.classList.remove("show");
      quizInput.value = "";

      const isPolitical = category.type === "political";
      standardInput.style.display = isPolitical ? "none" : "";
      politicalInput.style.display = isPolitical ? "" : "none";
      quizQuestion.textContent = isPolitical ? "Pour qui voter ?" : "2 + 2 = ?";
      modalSubtitle.textContent = isPolitical ? "" : "Prouvez que vous méritez le meilleur.";

      overlay.classList.add("active");
      document.body.style.overflow = "hidden";

      if (!isPolitical) setTimeout(() => quizInput.focus(), 400);
    }

    function showPoliticalResult() {
      quizContainer.classList.add("hide");
      politicalResult.classList.add("show");
    }

    function closeOverlay() {
      overlay.classList.remove("active");
      document.body.style.overflow = "";
      currentCategory = null;
    }

    function showResult(isCorrect) {
      const cat = currentCategory;
      const choice = isCorrect ? cat.smart : cat.dumb;

      quizContainer.classList.add("hide");
      resultContainer.classList.add("show");

      const cls = isCorrect ? "smart" : "dumb";

      resultIcon.textContent = isCorrect ? "🏆" : "🫠";
      resultTitle.className = `result-title ${cls}`;
      resultTitle.textContent = isCorrect ? "Bonne réponse !" : "Mauvaise réponse…";
      resultSiteName.className = `result-site-name ${cls}`;
      resultSiteName.textContent = choice.name;
      resultMessage.textContent = pickRandom(isCorrect ? SMART_MESSAGES : DUMB_MESSAGES);
      resultLink.className = `result-link ${cls}`;
      resultLink.href = choice.url;

      if (isCorrect) spawnConfetti();
    }

    function submitAnswer() {
      const val = parseInt(quizInput.value, 10);
      if (isNaN(val)) {
        quizInput.classList.add("shake");
        setTimeout(() => quizInput.classList.remove("shake"), 400);
        return;
      }
      showResult(val === 4);
    }

    quizBtn.addEventListener("click", submitAnswer);
    quizInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitAnswer();
    });

    modalClose.addEventListener("click", closeOverlay);
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeOverlay();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeOverlay();
    });

    retryBtn.addEventListener("click", closeOverlay);
    retryBtnPolitical.addEventListener("click", closeOverlay);
    btnGauche.addEventListener("click", showPoliticalResult);
    btnDroite.addEventListener("click", showPoliticalResult);

    document.querySelectorAll(".theme-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const theme = btn.dataset.pick;
        document.documentElement.setAttribute("data-theme", theme);
        document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        localStorage.setItem("theme", theme);
      });
    });

    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
      document.documentElement.setAttribute("data-theme", savedTheme);
      document.querySelectorAll(".theme-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.pick === savedTheme);
      });
    }

    function spawnConfetti() {
      const colors = ["#7c5cfc", "#fc5c9c", "#4ade80", "#facc15", "#38bdf8", "#fb923c"];
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.top = `${-10 + Math.random() * 20}px`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 0.6}s`;
        piece.style.animationDuration = `${1 + Math.random() * 1.5}s`;
        piece.style.width = `${6 + Math.random() * 6}px`;
        piece.style.height = `${6 + Math.random() * 6}px`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3000);
      }
    }
  </script>
