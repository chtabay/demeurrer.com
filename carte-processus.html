<!DOCTYPE html>
<html lang="fr" data-theme="neon">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte processus — diagramme en couches</title>
  <meta name="description" content="Carte interactive des processus d'agence par couche, avec suggestions d'outils.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="themes.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .noise-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
    }

    .bg-gradient {
      position: fixed; inset: 0; z-index: -1;
      background: var(--pattern-bg, none), var(--gradient-bg-1, none), var(--gradient-bg-2, none), var(--bg-primary);
    }

    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 900;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      background: color-mix(in srgb, var(--bg-primary) 88%, transparent);
      border-bottom: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
    }

    .header-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px; height: 44px;
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition), border-color var(--transition);
    }
    .header-nav-btn:hover { color: var(--text-primary); border-color: var(--card-border-hover); }

    .header-brand {
      text-align: center;
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      line-height: 1.25;
    }

    .page-wrap {
      max-width: min(1100px, 100%);
      margin: 0 auto;
      padding: calc(4.5rem + 0.5rem) 1rem 2rem;
    }

    .page-title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: clamp(1.25rem, 3vw, 1.65rem);
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-sub {
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text-secondary);
      max-width: 40rem;
      margin-bottom: 1.25rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.65rem 1rem;
      margin-bottom: 1.25rem;
      padding: 0.75rem 0.85rem;
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
    }

    .toolbar-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .filter-cycles {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .filter-btn {
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      background: var(--input-bg);
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .filter-btn:hover { color: var(--text-primary); border-color: var(--card-border-hover); }
    .filter-btn.is-active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .search-input {
      flex: 1 1 180px;
      min-width: 140px;
      padding: 0.45rem 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.85rem;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .metier-select {
      padding: 0.45rem 0.65rem;
      border-radius: 10px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.82rem;
      min-width: 10rem;
    }

    .legend-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    .legend-inline span {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot--bien { background: var(--accent); }
    .dot--annonce { background: var(--accent-secondary); }
    .dot--loc { background: color-mix(in srgb, var(--accent) 50%, var(--accent-secondary)); }

    .layer-stack {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }

    .layer-stack::before {
      content: "";
      position: absolute;
      left: 0.85rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--accent), var(--accent-secondary), color-mix(in srgb, var(--accent) 40%, var(--card-border)));
      border-radius: 2px;
      opacity: 0.35;
      pointer-events: none;
    }

    .layer-band {
      position: relative;
      padding: 0.85rem 0 0.85rem 2.1rem;
      border-bottom: 1px solid var(--card-border);
    }
    .layer-band:last-child { border-bottom: none; }

    .layer-head {
      margin-bottom: 0.65rem;
    }

    .layer-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--bg-primary);
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      margin-left: -1.35rem;
      margin-right: 0.35rem;
      vertical-align: middle;
    }

    .layer-title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: -0.02em;
      display: inline;
    }

    .layer-hint {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
      line-height: 1.4;
    }

    .layer-nodes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .process-chip {
      font-family: var(--font-body);
      text-align: left;
      cursor: pointer;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 0.55rem 0.7rem 0.5rem;
      background: color-mix(in srgb, var(--bg-card) 92%, transparent);
      color: var(--text-primary);
      transition: transform 0.15s ease, border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
      max-width: 100%;
    }
    .process-chip:hover { border-color: var(--accent); box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
    .process-chip:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .process-chip.is-dimmed {
      opacity: 0.28;
      pointer-events: none;
    }

    .process-chip__short {
      font-weight: 700;
      font-size: 0.82rem;
      line-height: 1.25;
      margin-bottom: 0.35rem;
    }

    .process-chip__cycles {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
    }

    .cycle-chip {
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.12rem 0.35rem;
      border-radius: 4px;
      border: 1px solid var(--card-border);
    }
    .cycle-chip--bien { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--card-border)); }
    .cycle-chip--annonce { color: var(--accent-secondary); border-color: color-mix(in srgb, var(--accent-secondary) 45%, var(--card-border)); }
    .cycle-chip--locataire { color: color-mix(in srgb, var(--accent) 70%, var(--text-primary)); }

    .panel-backdrop {
      position: fixed;
      inset: 0;
      z-index: 950;
      background: var(--overlay-bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .panel-backdrop.is-open { opacity: 1; pointer-events: auto; }

    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 960;
      width: min(28rem, 100%);
      height: 100vh;
      height: 100dvh;
      background: var(--bg-card);
      border-left: 1px solid var(--card-border);
      box-shadow: -16px 0 48px rgba(0, 0, 0, 0.25);
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .detail-panel.is-open { transform: translateX(0); }

    .detail-panel__head {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 1rem 1.1rem;
      background: color-mix(in srgb, var(--bg-card) 92%, transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .detail-panel__close {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--text-secondary);
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
    }
    .detail-panel__close:hover { color: var(--text-primary); border-color: var(--card-border-hover); }

    .detail-panel__title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .detail-panel__layer {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-top: 0.35rem;
    }

    .detail-panel__body {
      padding: 1rem 1.1rem 2rem;
      flex: 1;
    }

    .detail-desc {
      font-size: 0.88rem;
      line-height: 1.55;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    .tool-block {
      margin-bottom: 1.1rem;
    }
    .tool-block__cat {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--card-border);
    }
    .tool-block ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .tool-block li {
      font-size: 0.82rem;
      line-height: 1.45;
      color: var(--text-secondary);
      padding: 0.3rem 0 0.3rem 0.85rem;
      position: relative;
    }
    .tool-block li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.65em;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-secondary);
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .load-err {
      color: var(--fail);
      padding: 2rem;
      text-align: center;
    }

    .link-row {
      margin-top: 1rem;
      font-size: 0.82rem;
    }
    .link-row a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .link-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="bg-gradient"></div>

  <header class="site-header">
    <a href="index.html" class="header-nav-btn" aria-label="Retour" title="Retour">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 14L6 9l5-5"/>
      </svg>
    </a>
    <span class="header-brand">Carte processus</span>
    <a href="grille-metiers.html" class="header-nav-btn" aria-label="Grille 5 pourquoi" title="Grille métiers">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="5" height="5" rx="1"/>
        <rect x="11" y="2" width="5" height="5" rx="1"/>
        <rect x="2" y="11" width="5" height="5" rx="1"/>
        <rect x="11" y="11" width="5" height="5" rx="1"/>
      </svg>
    </a>
  </header>

  <div class="page-wrap">
    <p class="load-err" id="loadErr" hidden>Impossible de charger <code>carte-processus-data.json</code>.</p>
    <div id="app" hidden>
      <h1 class="page-title" id="pageTitle"></h1>
      <p class="page-sub" id="pageSub"></p>

      <div class="toolbar" role="search">
        <span class="toolbar-label">Filtrer</span>
        <div class="filter-cycles" id="filterCycles" role="group" aria-label="Filtrer par cycle de vie"></div>
        <label class="toolbar-label" for="metierSel" style="margin-left:0.25rem">Métier</label>
        <select class="metier-select" id="metierSel" aria-label="Filtrer par métier">
          <option value="">Tous les métiers</option>
        </select>
        <input type="search" class="search-input" id="searchInput" placeholder="Rechercher un processus…" autocomplete="off" aria-label="Rechercher">
      </div>

      <div class="legend-inline" id="legendInline"></div>
      <div class="layer-stack" id="layerStack"></div>
      <p class="link-row">Voir aussi la <a href="grille-metiers.html">grille métiers × cycles × 5 pourquoi</a>.</p>
    </div>
  </div>

  <div class="panel-backdrop" id="panelBackdrop" aria-hidden="true"></div>
  <aside class="detail-panel" id="detailPanel" aria-hidden="true" aria-labelledby="panelTitle">
    <div class="detail-panel__head">
      <div>
        <p class="detail-panel__layer" id="panelLayer"></p>
        <h2 class="detail-panel__title" id="panelTitle"></h2>
      </div>
      <button type="button" class="detail-panel__close" id="panelClose" aria-label="Fermer">&times;</button>
    </div>
    <div class="detail-panel__body" id="panelBody"></div>
  </aside>

  <script>
    const VALID_THEMES = new Set([
      "neon", "minimal", "vintage", "brutalist", "encre", "halftone", "bifleur", "gres",
      "ligne-claire", "riso", "metal", "op-art", "deco", "chlorophylle", "pixel", "voxel"
    ]);
    let savedTheme = localStorage.getItem("theme");
    if (savedTheme && VALID_THEMES.has(savedTheme)) {
      document.documentElement.setAttribute("data-theme", savedTheme);
    }

    const CYCLE_KEYS = ["bien", "annonce", "locataire"];
    const CYCLE_LABELS = { bien: "Bien", annonce: "Annonce", locataire: "Locataire" };

    let rawData = null;
    let activeCycle = "all";
    let activeMetier = "";
    let searchQuery = "";

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function normalize(s) {
      return String(s || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function processMatchesFilters(p) {
      const cycles = p.cycles || [];
      if (activeCycle !== "all" && !cycles.includes(activeCycle)) return false;
      if (activeMetier && !(p.metiers || []).includes(activeMetier)) return false;
      if (searchQuery.trim()) {
        const q = normalize(searchQuery);
        const blob = normalize([p.label, p.short, p.description, ...(p.metiers || [])].join(" "));
        if (!blob.includes(q)) return false;
      }
      return true;
    }

    function renderCycleChips(cycles) {
      return (cycles || [])
        .map((c) => {
          const cls =
            c === "bien" ? "cycle-chip--bien" : c === "annonce" ? "cycle-chip--annonce" : "cycle-chip--locataire";
          return `<span class="cycle-chip ${cls}">${escapeHtml(CYCLE_LABELS[c] || c)}</span>`;
        })
        .join("");
    }

    function openPanel(process) {
      const panel = document.getElementById("detailPanel");
      const backdrop = document.getElementById("panelBackdrop");
      const layers = rawData.layers || [];
      const layer = layers.find((l) => l.id === process.layerId);
      document.getElementById("panelLayer").textContent = layer ? layer.label : "";
      document.getElementById("panelTitle").textContent = process.label || "";
      const toolsHtml = (process.tools || [])
        .map((tb) => {
          const items = (tb.items || []).map((it) => `<li>${escapeHtml(it)}</li>`).join("");
          return `
            <div class="tool-block">
              <p class="tool-block__cat">${escapeHtml(tb.category || "")}</p>
              <ul>${items}</ul>
            </div>
          `;
        })
        .join("");
      document.getElementById("panelBody").innerHTML = `
        <p class="detail-desc">${escapeHtml(process.description || "")}</p>
        <p class="tool-block__cat" style="margin-bottom:0.65rem">Suggestions d'outils (familles)</p>
        ${toolsHtml}
      `;
      panel.classList.add("is-open");
      backdrop.classList.add("is-open");
      panel.setAttribute("aria-hidden", "false");
      backdrop.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closePanel() {
      document.getElementById("detailPanel").classList.remove("is-open");
      document.getElementById("panelBackdrop").classList.remove("is-open");
      document.getElementById("detailPanel").setAttribute("aria-hidden", "true");
      document.getElementById("panelBackdrop").setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function render() {
      const meta = rawData.meta || {};
      document.getElementById("pageTitle").textContent = meta.title || "Carte processus";
      document.getElementById("pageSub").textContent = meta.subtitle || "";

      const legend = document.getElementById("legendInline");
      legend.innerHTML = `
        <span><span class="dot dot--bien" aria-hidden="true"></span> ${escapeHtml((meta.legendCycles && meta.legendCycles.bien) || "Bien")}</span>
        <span><span class="dot dot--annonce" aria-hidden="true"></span> ${escapeHtml((meta.legendCycles && meta.legendCycles.annonce) || "Annonce")}</span>
        <span><span class="dot dot--loc" aria-hidden="true"></span> ${escapeHtml((meta.legendCycles && meta.legendCycles.locataire) || "Locataire")}</span>
      `;

      const filterEl = document.getElementById("filterCycles");
      filterEl.innerHTML = `
        <button type="button" class="filter-btn is-active" data-cycle="all">Tous</button>
        ${CYCLE_KEYS.map(
          (k) =>
            `<button type="button" class="filter-btn" data-cycle="${k}">${escapeHtml(CYCLE_LABELS[k])}</button>`
        ).join("")}
      `;
      filterEl.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeCycle = btn.getAttribute("data-cycle") || "all";
          filterEl.querySelectorAll(".filter-btn").forEach((b) => b.classList.toggle("is-active", b === btn));
          renderLayers();
        });
      });

      const metierSet = new Set();
      (rawData.processes || []).forEach((p) => (p.metiers || []).forEach((m) => metierSet.add(m)));
      const metierSel = document.getElementById("metierSel");
      const labels = {
        direction: "Direction",
        gestionnaire: "Gestionnaire",
        commercial: "Commercialisation",
        compta: "Comptabilité",
        juridique: "Juridique",
        technique: "Technique",
      };
      metierSel.innerHTML =
        `<option value="">Tous les métiers</option>` +
        Array.from(metierSet)
          .sort()
          .map((m) => `<option value="${escapeHtml(m)}">${escapeHtml(labels[m] || m)}</option>`)
          .join("");
      metierSel.value = activeMetier;
      metierSel.onchange = () => {
        activeMetier = metierSel.value;
        renderLayers();
      };

      document.getElementById("searchInput").oninput = (e) => {
        searchQuery = e.target.value;
        renderLayers();
      };

      renderLayers();
    }

    function renderLayers() {
      const layers = [...(rawData.layers || [])].sort((a, b) => (a.order || 0) - (b.order || 0));
      const processes = rawData.processes || [];
      const filtersActive = activeCycle !== "all" || Boolean(activeMetier) || Boolean(searchQuery.trim());

      let anyMatch = false;
      processes.forEach((p) => {
        if (processMatchesFilters(p)) anyMatch = true;
      });

      const stack = document.getElementById("layerStack");
      if (filtersActive && !anyMatch) {
        stack.innerHTML = `<p class="empty-state" role="status">Aucun processus ne correspond aux filtres. Réinitialisez le cycle, le métier ou la recherche.</p>`;
        return;
      }

      stack.innerHTML = layers
        .map((layer, idx) => {
          const layerProcesses = processes.filter((p) => p.layerId === layer.id);
          const chips = layerProcesses
            .map((p) => {
              const match = processMatchesFilters(p);
              const dim = filtersActive && !match;
              const cls = dim ? "process-chip is-dimmed" : "process-chip";
              return `
                <button type="button" class="${cls}" data-id="${escapeHtml(p.id)}">
                  <div class="process-chip__short">${escapeHtml(p.short || p.label)}</div>
                  <div class="process-chip__cycles">${renderCycleChips(p.cycles)}</div>
                </button>
              `;
            })
            .join("");

          return `
            <section class="layer-band" aria-labelledby="layer-h-${layer.id}">
              <div class="layer-head">
                <span class="layer-num" aria-hidden="true">${idx + 1}</span>
                <h2 class="layer-title" id="layer-h-${layer.id}">${escapeHtml(layer.label)}</h2>
                <p class="layer-hint">${escapeHtml(layer.hint || "")}</p>
              </div>
              <div class="layer-nodes">${chips}</div>
            </section>
          `;
        })
        .join("");

      stack.querySelectorAll(".process-chip").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-id");
          const proc = processes.find((x) => x.id === id);
          if (proc) openPanel(proc);
        });
      });
    }

    document.getElementById("panelClose").addEventListener("click", closePanel);
    document.getElementById("panelBackdrop").addEventListener("click", closePanel);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closePanel();
    });

    fetch("carte-processus-data.json")
      .then((r) => {
        if (!r.ok) throw new Error(String(r.status));
        return r.json();
      })
      .then((data) => {
        rawData = data;
        document.getElementById("app").hidden = false;
        render();
      })
      .catch(() => {
        document.getElementById("loadErr").hidden = false;
      });
  </script>
</body>
</html>
